<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{SITE_DESC}}">
<title>{{SITE_TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --text: #1A1A1A;
    --text-secondary: #707070;
    --accent: #C4735A;
    --accent-light: rgba(196, 115, 90, 0.08);
    --rule: #E8E4DE;
    --timeline-line: #DDD8D0;
    --max-width: 680px;
    --gap-section: 80px;
    --font-serif: 'Noto Serif SC', serif;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 36px 24px 0;
    display: flex;
    justify-content: flex-end;
    gap: 28px;
  }
  nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 14px;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--accent); }
  main {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 24px;
  }
  footer {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 100px 24px 56px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }
  footer::before {
    content: '~';
    display: block;
    color: var(--accent);
    font-size: 20px;
    margin-bottom: 20px;
  }

  /* Hero — book title page style */
  .hero {
    text-align: center;
    padding-top: 120px;
    padding-bottom: 100px;
  }
  .hero h1 {
    font-family: var(--font-serif);
    font-size: 36px;
    font-weight: 600;
    line-height: 1.5;
    letter-spacing: 0.04em;
    margin-bottom: 32px;
  }
  .hero p {
    color: var(--text-secondary);
    font-size: 17px;
    max-width: 440px;
    margin: 0 auto 48px;
    line-height: 1.8;
  }
  .hero .links { display: flex; gap: 20px; justify-content: center; }
  .hero .links a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    border-bottom: 1.5px solid var(--accent);
    padding-bottom: 2px;
  }
  .scroll-hint {
    margin-top: 60px;
    color: var(--text-secondary);
    font-size: 28px;
    animation: bounce 2s ease infinite;
  }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

  /* Section headings */
  .section-heading {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 36px;
    letter-spacing: 0.03em;
  }

  /* Narrative intro for works */
  .narrative {
    font-family: var(--font-serif);
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 48px;
    padding-left: 16px;
    border-left: 2px solid var(--accent);
  }

  /* Timeline — the core of this style */
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: var(--timeline-line);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 40px;
    padding: 16px 0 16px 28px;
    border-radius: 6px;
    transition: background 0.25s;
  }
  .timeline-item:hover { background: var(--accent-light); }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -37px;
    top: 24px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }
  .timeline-item .year {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .timeline-item .title {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .timeline-item .desc { color: var(--text-secondary); font-size: 14px; }
  .timeline-item .tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent);
  }

  /* Articles */
  .article-list { display: flex; flex-direction: column; gap: 24px; }
  .article-card {
    padding: 16px 0;
    transition: background 0.2s;
    cursor: default;
  }
  .article-card:hover { background: var(--accent-light); border-radius: 6px; }
  .article-card .date { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
  .article-card .title {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .article-card .desc { color: var(--text-secondary); font-size: 14px; }
  .article-card:not(:last-child) { border-bottom: 1px solid var(--rule); }

  /* About */
  .about-block p { margin-bottom: 16px; color: var(--text-secondary); font-size: 15px; }

  /* Contact */
  .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
  .contact-card {
    cursor: pointer;
    padding: 32px 24px;
    text-align: center;
    background: #fff;
    border: 1px solid var(--rule);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .contact-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .contact-card .platform-icon { font-size: 32px; margin-bottom: 12px; }
  .contact-card .platform-name {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .contact-card .platform-hint { font-size: 12px; color: var(--text-secondary); }
  /* Modal */
  .qr-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    justify-content: center; align-items: center;
  }
  .qr-overlay.active { display: flex; }
  .qr-modal {
    background: #fff;
    width: 320px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
  }
  .qr-modal .close-btn {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    font-size: 22px; color: var(--text-secondary);
    cursor: pointer; line-height: 1;
  }
  .qr-modal .close-btn:hover { color: var(--text); }
  .qr-modal .modal-title {
    font-family: var(--font-serif);
    font-size: 20px; font-weight: 700;
    margin-bottom: 8px;
  }
  .qr-modal .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .qr-modal .qr-img {
    width: 200px; height: 200px;
    margin: 0 auto;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #999;
  }
  .qr-modal .qr-label { margin-top: 16px; font-size: 13px; color: var(--text-secondary); }

  @media (max-width: 540px) {
    .hero { padding-top: 80px; }
    .hero h1 { font-size: 28px; }
    .timeline { padding-left: 32px; }
    .timeline-item { padding-left: 20px; }
    nav { justify-content: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="#projects">项目</a>
  <a href="#articles">文章</a>
  <a href="#about">关于</a>
  <a href="#contact">联系</a>
</nav>

<main>
  <!-- HERO_HERE -->

  <section id="projects">
    <div class="section-heading">项目</div>
    <!-- NARRATIVE_HERE -->
    <!-- PROJECTS_HERE -->
  </section>

  <section id="articles">
    <div class="section-heading">文章</div>
    <!-- ARTICLES_HERE -->
  </section>

  <section id="about">
    <div class="section-heading">关于</div>
    <!-- ABOUT_HERE -->
  </section>

  <section id="contact">
    <div class="section-heading">联系</div>
    <!-- CONTACT_HERE -->
    <div class="contact-grid">
      <div class="contact-card" data-platform="wechat">
        <div class="platform-icon">💬</div>
        <div class="platform-name">微信公众号</div>
        <div class="platform-hint">扫码关注</div>
      </div>
      <div class="contact-card" data-platform="xiaohongshu">
        <div class="platform-icon">📕</div>
        <div class="platform-name">小红书</div>
        <div class="platform-hint">扫码关注</div>
      </div>
      <div class="contact-card" data-platform="feishu">
        <div class="platform-icon">📚</div>
        <div class="platform-name">飞书知识库</div>
        <div class="platform-hint">扫码加入</div>
      </div>
    </div>
  </section>

  <div class="qr-overlay" id="qrOverlay">
    <div class="qr-modal">
      <button class="close-btn" id="qrClose">&times;</button>
      <div class="modal-title" id="qrTitle"></div>
      <div class="modal-sub" id="qrSub"></div>
      <div class="qr-img" id="qrImage">二维码占位</div>
      <div class="qr-label" id="qrLabel"></div>
    </div>
  </div>
</main>

<footer>
  <p>{{FOOTER_TEXT}}</p>
</footer>

<script>
(function() {
  var demo = {{DEMO_DATA}};

  if (demo.projects) {
    var container = (document.getElementById('projects').querySelector('.timeline') || (function() {
      var g = document.createElement('div'); g.className = 'timeline';
      document.getElementById('projects').appendChild(g);
      return g;
    })());
    container.innerHTML = demo.projects.map(function(p) {
      return '<div class="timeline-item">' +
        '<div class="year">' + (p.year || '') + '</div>' +
        '<div class="title">' + p.title + '</div>' +
        '<div class="desc">' + p.desc + '</div>' +
        (p.tag ? '<span class="tag">' + p.tag + '</span>' : '') + '</div>';
    }).join('');
  }

  if (demo.articles) {
    var container = (document.getElementById('articles').querySelector('.article-list') || (function() {
      var g = document.createElement('div'); g.className = 'article-list';
      document.getElementById('articles').appendChild(g);
      return g;
    })());
    container.innerHTML = demo.articles.map(function(a) {
      return '<div class="article-card">' +
        '<div class="date">' + a.date + '</div>' +
        '<div class="title">' + a.title + '</div>' +
        '<div class="desc">' + a.summary + '</div></div>';
    }).join('');
  }
})();

// QR Code Modal
(function() {
  var overlay = document.getElementById('qrOverlay');
  var title = document.getElementById('qrTitle');
  var sub = document.getElementById('qrSub');
  var qrImg = document.getElementById('qrImage');
  var qrLabel = document.getElementById('qrLabel');
  var closeBtn = document.getElementById('qrClose');

  var qrData = {
    wechat: { title: '微信公众号', sub: '互联互说', label: '扫码关注，获取每日 AI 资讯', img: '' },
    xiaohongshu: { title: '小红书', sub: 'Oli芬', label: '扫码关注，一起探索 AI 应用', img: '' },
    feishu: { title: '飞书知识库', sub: 'AI Future', label: '扫码加入，获取 AI 前沿研究', img: '' }
  };

  var cards = document.querySelectorAll('.contact-card');
  cards.forEach(function(card) {
    card.addEventListener('click', function() {
      var p = this.dataset.platform;
      var d = qrData[p] || {};
      title.textContent = d.title || '';
      sub.textContent = d.sub || '';
      qrLabel.textContent = d.label || '';
      qrImg.innerHTML = '<div style="text-align:center;width:100%"><div style="font-size:60px;margin-bottom:8px">📱</div><div style="font-size:13px;color:#999">' + (d.title || '') + '<br>二维码待上传</div></div>';
      overlay.classList.add('active');
    });
  });

  function closeModal() { overlay.classList.remove('active'); }
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
})();
</script>

</body>
</html>
