<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{SITE_DESC}}">
<title>{{SITE_TITLE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080F;
    --text: #F0F0F5;
    --text-secondary: #6B6B80;
    --cyan: #00F0FF;
    --purple: #8B5CF6;
    --magenta: #FF00E5;
    --card-bg: #111122;
    --card-border: rgba(139, 92, 246, 0.3);
    --glow-cyan: 0 0 10px rgba(0, 240, 255, 0.4);
    --glow-purple: 0 0 15px rgba(139, 92, 246, 0.15);
    --max-width: 880px;
    --gap-section: 100px;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--text);
    line-height: 1.7;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 32px 24px 0;
    display: flex;
    justify-content: flex-end;
    gap: 32px;
  }
  nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s, text-shadow 0.2s;
  }
  nav a:hover { color: var(--cyan); text-shadow: var(--glow-cyan); }
  main {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 24px;
  }
  footer {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 80px 24px 48px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* Neon glow lines between sections */
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    margin: 0 auto;
    max-width: var(--max-width);
    opacity: 0.3;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding-top: 80px;
    padding-bottom: var(--gap-section);
  }
  .hero h1 {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    margin-bottom: 12px;
  }
  .hero p {
    color: var(--text-secondary);
    font-size: 18px;
    margin-bottom: 36px;
  }
  .skill-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .skill-tag {
    padding: 6px 18px;
    border: 1px solid var(--card-border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    transition: border-color 0.2s, text-shadow 0.2s, box-shadow 0.2s;
    cursor: default;
  }
  .skill-tag:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    box-shadow: 0 0 12px rgba(0, 240, 255, 0.15);
  }

  /* Section headings */
  .section-heading {
    font-size: 14px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 36px;
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.2);
  }

  /* Project cards */
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .project-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 28px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .project-card:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.08);
  }
  .project-card .icon { font-size: 24px; margin-bottom: 14px; }
  .project-card .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .project-card .desc { color: var(--text-secondary); font-size: 14px; line-height: 1.7; }
  .project-card .tag {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    color: var(--purple);
    border: 1px solid var(--card-border);
    padding: 3px 10px;
    border-radius: 4px;
  }

  /* Article cards */
  .article-list { display: flex; flex-direction: column; gap: 20px; }
  .article-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 24px 28px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .article-card:hover {
    border-color: var(--purple);
    box-shadow: 0 0 16px rgba(139, 92, 246, 0.1);
  }
  .article-card .date { font-size: 12px; color: var(--cyan); margin-bottom: 4px; }
  .article-card .title { font-weight: 600; font-size: 17px; margin-bottom: 6px; }
  .article-card .desc { color: var(--text-secondary); font-size: 14px; }

  /* About */
  .about-block p { margin-bottom: 14px; color: var(--text-secondary); font-size: 15px; }

  /* Contact */
  .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
  .contact-card {
    cursor: pointer;
    padding: 32px 24px;
    text-align: center;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .contact-card:hover { border-color: var(--cyan); box-shadow: 0 0 16px rgba(0, 240, 255, 0.08); }
  .contact-card .platform-icon { font-size: 32px; margin-bottom: 12px; }
  .contact-card .platform-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .contact-card .platform-hint { font-size: 12px; color: var(--text-secondary); }
  /* Modal */
  .qr-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center; align-items: center;
  }
  .qr-overlay.active { display: flex; }
  .qr-modal {
    background: var(--card-bg);
    width: 320px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
    border: 1px solid var(--card-border);
  }
  .qr-modal .close-btn {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    font-size: 22px; color: var(--text-secondary);
    cursor: pointer; line-height: 1;
  }
  .qr-modal .close-btn:hover { color: var(--text); }
  .qr-modal .modal-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 8px;
  }
  .qr-modal .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .qr-modal .qr-img {
    width: 200px; height: 200px;
    margin: 0 auto;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #999;
  }
  .qr-modal .qr-label { margin-top: 16px; font-size: 13px; color: var(--text-secondary); }

  @media (max-width: 640px) {
    :root { --gap-section: 64px; }
    .hero { padding-top: 48px; }
    .hero h1 { font-size: 36px; }
    .project-grid { grid-template-columns: 1fr; }
    nav { justify-content: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="#projects">项目</a>
  <a href="#articles">文章</a>
  <a href="#about">关于</a>
  <a href="#contact">联系</a>
</nav>

<main>
  <!-- HERO_HERE -->

  <div class="section-divider"></div>

  <section id="projects">
    <div class="section-heading">// 项目</div>
    <!-- PROJECTS_HERE -->
  </section>

  <div class="section-divider"></div>

  <section id="articles">
    <div class="section-heading">// 文章</div>
    <!-- ARTICLES_HERE -->
  </section>

  <div class="section-divider"></div>

  <section id="about">
    <div class="section-heading">// 关于</div>
    <!-- ABOUT_HERE -->
  </section>

  <div class="section-divider"></div>

  <section id="contact">
    <div class="section-heading">// 联系</div>
    <!-- CONTACT_HERE -->
    <div class="contact-grid">
      <div class="contact-card" data-platform="email">
        <div class="platform-icon">✉️</div>
        <div class="platform-name">Email</div>
        <div class="platform-hint">发送邮件</div>
      </div>
      <div class="contact-card" data-platform="github">
        <div class="platform-icon">💻</div>
        <div class="platform-name">GitHub</div>
        <div class="platform-hint">查看作品</div>
      </div>
      <div class="contact-card" data-platform="newsletter">
        <div class="platform-icon">📬</div>
        <div class="platform-name">Newsletter</div>
        <div class="platform-hint">订阅更新</div>
      </div>
    </div>
  </section>

  <div class="qr-overlay" id="qrOverlay">
    <div class="qr-modal">
      <button class="close-btn" id="qrClose">&times;</button>
      <div class="modal-title" id="qrTitle"></div>
      <div class="modal-sub" id="qrSub"></div>
      <div class="qr-img" id="qrImage">二维码占位</div>
      <div class="qr-label" id="qrLabel"></div>
    </div>
  </div>
</main>

<footer>
  <p>{{FOOTER_TEXT}}</p>
</footer>

<script>
(function() {
  var demo = {{DEMO_DATA}};

  if (demo.projects) {
    var container = (document.getElementById('projects').querySelector('.project-grid') || (function() {
      var g = document.createElement('div'); g.className = 'project-grid';
      document.getElementById('projects').appendChild(g);
      return g;
    })());
    container.innerHTML = demo.projects.map(function(p) {
      return '<div class="project-card">' +
        '<div class="icon">' + (p.icon || '⚡') + '</div>' +
        '<div class="title">' + p.title + '</div>' +
        '<div class="desc">' + p.desc + '</div>' +
        (p.tag ? '<span class="tag">' + p.tag + '</span>' : '') + '</div>';
    }).join('');
  }

  if (demo.articles) {
    var container = (document.getElementById('articles').querySelector('.article-list') || (function() {
      var g = document.createElement('div'); g.className = 'article-list';
      document.getElementById('articles').appendChild(g);
      return g;
    })());
    container.innerHTML = demo.articles.map(function(a) {
      return '<div class="article-card">' +
        '<div class="date">' + a.date + '</div>' +
        '<div class="title">' + a.title + '</div>' +
        '<div class="desc">' + a.summary + '</div></div>';
    }).join('');
  }
})();

// QR Code Modal
(function() {
  var overlay = document.getElementById('qrOverlay');
  var title = document.getElementById('qrTitle');
  var sub = document.getElementById('qrSub');
  var qrImg = document.getElementById('qrImage');
  var qrLabel = document.getElementById('qrLabel');
  var closeBtn = document.getElementById('qrClose');

  var qrData = {
    email: { title: 'Email', sub: 'your-name@example.com', label: '替换为真实邮箱或 mailto 链接', img: '' },
    github: { title: 'GitHub', sub: 'github.com/your-name', label: '替换为真实 GitHub 或作品链接', img: '' },
    newsletter: { title: 'Newsletter', sub: 'your newsletter link', label: '替换为真实订阅链接或二维码', img: '' }
  };

  var cards = document.querySelectorAll('.contact-card');
  cards.forEach(function(card) {
    card.addEventListener('click', function() {
      var p = this.dataset.platform;
      var d = qrData[p] || {};
      title.textContent = d.title || '';
      sub.textContent = d.sub || '';
      qrLabel.textContent = d.label || '';
      qrImg.innerHTML = '<div style="text-align:center;width:100%"><div style="font-size:60px;margin-bottom:8px">📱</div><div style="font-size:13px;color:#999">' + (d.title || '') + '<br>二维码待上传</div></div>';
      overlay.classList.add('active');
    });
  });

  function closeModal() { overlay.classList.remove('active'); }
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
})();
</script>

</body>
</html>

</body>
